<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#3D8EF8"/>
      <stop offset="100%" stop-color="#7B5CF8"/>
    </linearGradient>
    <linearGradient id="gl" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#00E87A"/>
      <stop offset="100%" stop-color="#3D8EF8"/>
    </linearGradient>
  </defs>
  <!-- Rounded bg -->
  <rect width="32" height="32" rx="8" fill="url(#bg)"/>
  <!-- Globe circle -->
  <circle cx="15" cy="14" r="9" fill="none" stroke="rgba(255,255,255,0.85)" stroke-width="1.4"/>
  <!-- Globe horizontal lines -->
  <line x1="6" y1="14" x2="24" y2="14" stroke="rgba(255,255,255,0.6)" stroke-width="1"/>
  <line x1="7.5" y1="9.8" x2="22.5" y2="9.8" stroke="rgba(255,255,255,0.4)" stroke-width="0.9"/>
  <line x1="7.5" y1="18.2" x2="22.5" y2="18.2" stroke="rgba(255,255,255,0.4)" stroke-width="0.9"/>
  <!-- Globe vertical ellipse -->
  <ellipse cx="15" cy="14" rx="3.8" ry="9" fill="none" stroke="rgba(255,255,255,0.5)" stroke-width="1"/>
  <!-- Shield badge bottom-right -->
  <circle cx="23" cy="23" r="7" fill="url(#gl)"/>
  <!-- Lock body -->
  <rect x="20.2" y="22.8" width="5.6" height="4.2" rx="1.2" fill="white" opacity="0.95"/>
  <!-- Lock shackle -->
  <path d="M21.3 22.8 V21.2 C21.3 19.5 24.7 19.5 24.7 21.2 V22.8" fill="none" stroke="white" stroke-width="1.5" stroke-linecap="round"/>
</svg>
